name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"
      - name: Run tests
        run: python -m pytest tests -q
      - name: Agent eval smoke (dry-run, validates golden set + script)
        run: python scripts/evaluate_agent.py --dry-run
      - name: Harness eval smoke (mock/offline)
        env:
          MODEL_PROVIDER: mock
          CI_SMOKE_LIMIT: "1"
        run: python scripts/evaluate_agent.py --mode harness --smoke --gate --min-pass-rate 0.0 --min-tool-recall 0.0 --min-keyword-recall 0.0
