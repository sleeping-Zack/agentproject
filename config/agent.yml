external_data_path: data/external/records.csv
default_user_id: "1005"
default_user_location: 合肥
current_month: "2025-09"
trace_enabled: true
answer_verifier:
  require_citation: true
  min_overall_score: 3.5
  min_faithfulness_score: 4.0
  llm_judge:
    # Explicitly enabled in production/online evaluation with
    # AGENT_LLM_JUDGE_ENABLED=true to keep deterministic CI free of model cost.
    enabled: false
    timeout_seconds: 20
allowed_tools:
  - rag_summarize
  - get_weather
  - get_user_location
  - get_user_id
  - get_current_month
  - fetch_external_data
  - fill_context_for_report
default_weather:
